<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inicio de sesión — Sistema de Gestión de Pollos">
  <title>Iniciar Sesión — Gestión de Pollos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --bg-card:    rgba(22, 27, 34, 0.95);
      --border:     rgba(255,255,255,0.08);
      --text:       #e6edf3;
      --text-muted: #8b949e;
      --accent:     #f59e0b;
      --accent-glow:rgba(245,158,11,0.25);
      --danger:     #ef4444;
      --success:    #22c55e;
      --input-bg:   rgba(255,255,255,0.05);
      --radius:     14px;
    }

    [data-theme="light"] {
      --bg:       #f0f4f8;
      --bg-card:  rgba(255,255,255,0.97);
      --border:   rgba(0,0,0,0.08);
      --text:     #1a202c;
      --text-muted:#64748b;
      --input-bg: rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.04) 0%, transparent 50%);
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* Logo / Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.5s ease;
    }
    .brand__icon {
      font-size: 56px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(245,158,11,0.4));
    }
    .brand__title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand__subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease;
    }

    .card__title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.2);
    }
    .form-input::placeholder { color: var(--text-muted); }

    /* Password wrapper */
    .input-wrapper { position: relative; }
    .input-wrapper .form-input { padding-right: 44px; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text-muted);
      padding: 4px;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Error message */
    .form-error {
      font-size: 0.78rem;
      color: var(--danger);
      margin-top: 5px;
      min-height: 18px;
      display: block;
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shake 0.4s ease;
    }
    .alert--error   { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    .alert--success { background: rgba(34,197,94,0.12);  border: 1px solid rgba(34,197,94,0.3);  color: #86efac; }
    .alert.hidden { display: none; }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 13px 24px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a0a00;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(245,158,11,0.4);
    }
    .btn-login:active  { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #1a0a00;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    /* Theme toggle */
    .theme-btn {
      position: fixed;
      top: 20px; right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px; height: 40px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: transform 0.2s;
    }
    .theme-btn:hover { transform: scale(1.1); }

    /* Footer */
    .login-footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 24px;
    }

    /* Animations */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(20px);  } to { opacity:1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
  </style>
</head>
<body>
  <button class="theme-btn" id="themeToggle" title="Cambiar tema">🌙</button>

  <div class="login-wrapper">
    <div class="brand">
      <span class="brand__icon">🐔</span>
      <h1 class="brand__title">Gestión de Pollos</h1>
      <p class="brand__subtitle">Inventario & Control de Ventas</p>
    </div>

    <div class="card">
      <h2 class="card__title">Iniciar Sesión</h2>

      <div class="alert alert--error hidden" id="alertError" role="alert">
        <span>❌</span>
        <span id="alertMsg">Error al iniciar sesión</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username" class="form-label">Usuario</label>
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Ingresa tu usuario"
            autocomplete="username"
            autofocus
            required
            maxlength="50"
          >
          <span class="form-error" id="errorUsername"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Ingresa tu contraseña"
              autocomplete="current-password"
              required
              maxlength="100"
            >
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">👁️</button>
          </div>
          <span class="form-error" id="errorPassword"></span>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-text">🔐 Ingresar al Sistema</span>
        </button>
      </form>
    </div>

    <p class="login-footer">
      🔒 Conexión segura — Sistema privado
    </p>
  </div>

  <script>
    // ========================
    // THEME
    // ========================
    const themeToggle = document.getElementById('themeToggle');
    const saved = localStorage.getItem('pollos-theme') || 'dark';
    if (saved === 'light') {
      document.body.setAttribute('data-theme', 'light');
      themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
      const isLight = document.body.getAttribute('data-theme') === 'light';
      if (isLight) {
        document.body.removeAttribute('data-theme');
        themeToggle.textContent = '🌙';
        localStorage.setItem('pollos-theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        themeToggle.textContent = '☀️';
        localStorage.setItem('pollos-theme', 'light');
      }
    });

    // ========================
    // PASSWORD TOGGLE
    // ========================
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const btn = document.getElementById('togglePw');
      if (pw.type === 'password') {
        pw.type = 'text';
        btn.textContent = '🙈';
      } else {
        pw.type = 'password';
        btn.textContent = '👁️';
      }
    });

    // ========================
    // LOGIN FORM
    // ========================
    const form    = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const alertBox = document.getElementById('alertError');
    const alertMsg = document.getElementById('alertMsg');

    // Si ya hay sesión activa, redirigir
    const token = localStorage.getItem('pollos-token');
    if (token) {
      window.location.replace('/');
    }

    function showAlert(msg) {
      alertMsg.textContent = msg;
      alertBox.classList.remove('hidden');
    }
    function hideAlert() { alertBox.classList.add('hidden'); }
    function setLoading(on) {
      btnLogin.disabled = on;
      btnLogin.classList.toggle('loading', on);
    }
    function clearErrors() {
      hideAlert();
      ['username','password'].forEach(f => {
        document.getElementById(f).classList.remove('error');
        document.getElementById(`error${f.charAt(0).toUpperCase() + f.slice(1)}`).textContent = '';
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Validaciones simples del cliente
      let hasErr = false;
      if (!username) {
        document.getElementById('username').classList.add('error');
        document.getElementById('errorUsername').textContent = 'El usuario es obligatorio';
        hasErr = true;
      }
      if (!password) {
        document.getElementById('password').classList.add('error');
        document.getElementById('errorPassword').textContent = 'La contraseña es obligatoria';
        hasErr = true;
      }
      if (hasErr) return;

      setLoading(true);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          // Guardar token y datos del usuario
          localStorage.setItem('pollos-token', data.token);
          localStorage.setItem('pollos-user', JSON.stringify(data.user));
          // Redirigir al dashboard
          window.location.replace('/');
        } else {
          const msg = (data.errors && data.errors[0]) || data.error || 'Error al iniciar sesión';
          showAlert(msg);
          document.getElementById('password').value = '';
        }
      } catch (err) {
        showAlert('Error de conexión. Verifica que el servidor esté activo.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
